<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Currículo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f0fa;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #5f2c82;
            margin-bottom: 5px;
        }

        h2 {
            color: #8a2be2;
            border-bottom: 2px solid #8a2be2;
            padding-bottom: 5px;
        }

        p {
            margin: 5px 0;
        }

        .info {
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            width: 220px;
            margin: 10px auto;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 15px;
        }

        .btn-print {
            background: #8a2be2;
            color: white;
        }

        .btn-print:hover {
            background: #5f2c82;
        }

        .btn-delete {
            background: #d9534f;
            color: white;
        }

        .btn-delete:hover {
            background: #b52b27;
        }

        @media print {
            .btn {
                display: none;
            }

            body {
                background: white;
            }

            .container {
                box-shadow: none;
                margin: 0;
            }
        }
    </style>
</head>

<body>

<div class="container" id="curriculo">
    <h1 id="nome"></h1>
    <p id="email"></p>
    <p id="telefone"></p>

    <div class="info">
        <h2>Formação</h2>
        <p id="formacao"></p>
    </div>

    <div class="info">
        <h2>Cursos</h2>
        <p id="cursos"></p>
    </div>

    <div class="info">
        <h2>Experiência Profissional</h2>
        <p id="experiencia"></p>
    </div>
</div>

<button class="btn btn-print" onclick="window.print()">Imprimir Currículo</button>

<button class="btn btn-delete" onclick="apagarDados()">Apagar Dados</button>

<script>
    const dados = JSON.parse(localStorage.getItem("curriculo"));

    if (!dados) {
        document.body.innerHTML = "<h2 style='text-align:center;'>Nenhum dado encontrado. Volte e preencha o formulário.</h2>";
    } else {
        document.getElementById("nome").textContent = dados.nome;
        document.getElementById("email").textContent = "Email: " + dados.email;
        document.getElementById("telefone").textContent = "Telefone: " + dados.telefone;
        document.getElementById("formacao").textContent = dados.formacao;
        document.getElementById("cursos").textContent = dados.cursos;
        document.getElementById("experiencia").textContent = dados.experiencia;
    }

    function apagarDados() {
        const confirmar = confirm("Tem certeza que deseja apagar os dados do currículo?");

        if (confirmar) {
            localStorage.removeItem("curriculo");
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
