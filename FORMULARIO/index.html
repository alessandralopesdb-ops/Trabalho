<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Currículo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #5f2c82, #8a2be2);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #5f2c82;
        }

        label {
            font-weight: bold;
            color: #5f2c82;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #8a2be2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #5f2c82;
        }

        .btn-clear {
            background: #d9534f;
        }

        .btn-clear:hover {
            background: #b52b27;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Cadastro de Currículo</h2>

    <form id="formCurriculo">

        <h3>Dados Pessoais</h3>
        <label>Nome:</label>
        <input type="text" id="nome">
        <div class="error" id="erroNome"></div>

        <label>Email:</label>
        <input type="email" id="email">
        <div class="error" id="erroEmail"></div>

        <label>Telefone:</label>
        <input type="text" id="telefone">

        <h3>Formação</h3>
        <label>Escolaridade:</label>
        <input type="text" id="formacao">

        <h3>Cursos</h3>
        <textarea id="cursos" rows="3"></textarea>

        <h3>Experiência Profissional</h3>
        <textarea id="experiencia" rows="4"></textarea>

        <button type="submit">Gerar Currículo</button>
        <button type="button" class="btn-clear" onclick="limparDados()">Apagar Dados</button>

    </form>
</div>

<script>
    const form = document.getElementById("formCurriculo");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        let nome = document.getElementById("nome").value.trim();
        let email = document.getElementById("email").value.trim();

        let erro = false;

        document.getElementById("erroNome").textContent = "";
        document.getElementById("erroEmail").textContent = "";

        if (nome === "") {
            document.getElementById("erroNome").textContent = "Nome é obrigatório";
            erro = true;
        }

        if (email === "") {
            document.getElementById("erroEmail").textContent = "Email é obrigatório";
            erro = true;
        }

        if (erro) return;

        const dados = {
            nome: nome,
            email: email,
            telefone: document.getElementById("telefone").value,
            formacao: document.getElementById("formacao").value,
            cursos: document.getElementById("cursos").value,
            experiencia: document.getElementById("experiencia").value
        };

        localStorage.setItem("curriculo", JSON.stringify(dados));

        window.location.href = "curriculo.html";
    });

    function limparDados() {
        if (confirm("Tem certeza que deseja apagar os dados?")) {
            localStorage.removeItem("curriculo");

            document.getElementById("formCurriculo").reset();

            document.getElementById("erroNome").textContent = "";
            document.getElementById("erroEmail").textContent = "";

            alert("Dados apagados com sucesso!");
        }
    }
</script>

</body>
</html>
